<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive map for Baldi's Basics Classic Remastered">
    <title>BBCR Map</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button class="theme-btn" type="button" id="theme-toggle">
        <img src="Theme.png" class="default-img">
        <img src="ThemeHover.png" class="hover-img">
    </button>

    <div class="door-container">
        <button class="style-door" type="button" id="classic-style-door">
            <img src="StyleDoors/StyleShut.png" class="default-img">
            <img src="StyleDoors/StyleClassic.png" class="hover-img">
        </button>

        <button class="style-door" type="button" id="party-style-door">
            <img src="StyleDoors/StyleShut.png" class="default-img">
            <img src="StyleDoors/StyleParty.png" class="hover-img">
        </button>

        <button class="style-door" type="button" id="demo-style-door">
            <img src="StyleDoors/StyleShut.png" class="default-img">
            <img src="StyleDoors/StyleDemo.png" class="hover-img">
        </button>
    </div>

    <img src="BaldiMenuTalk.png" id="baldi">

    <h1 id="style-info">Select style</h1>

    <script src="script.js"></script>

</body>
</html>
