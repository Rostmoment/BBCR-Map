<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive map for Baldi's Basics Classic Remastered">
    <title>BBCR Map</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../general.css">
    <link rel="icon" type="image/png" href="../Icons/Classic.png">
</head>
<body>

    <div class="bottom-buttons-container">
        <button class="image-button" type="button" id="github-button">
            <img src="Github.png" class="default-img">
            <img src="GithubHover.png" class="hover-img">
        </button>
        <button class="image-button" type="button" id="credits-button">
            <img src="Credits.png" class="default-img">
            <img src="CreditsHover.png" class="hover-img">
        </button>
    </div>

    <div class="door-container">
        <button class="style-door image-button" type="button" id="classic-style-door">
            <img src="StyleDoors/StyleShut.png" class="default-img">
            <img src="StyleDoors/StyleClassic.png" class="hover-img">
            <span class="door-text">Classic Style</span>
        </button>

        <button class="style-door image-button" type="button" id="party-style-door">
            <img src="StyleDoors/StyleShut.png" class="default-img">
            <img src="StyleDoors/StyleParty.png" class="hover-img">
            <span class="door-text">Party Style</span>
        </button>

        <button class="style-door image-button" type="button" id="demo-style-door">
            <img src="StyleDoors/StyleShut.png" class="default-img">
            <img src="StyleDoors/StyleDemo.png" class="hover-img">
            <span class="door-text">Demo Style</span>
        </button>
    </div>

    <button id="null-style">
        <img src="BaldiMenuTalk.png">
        <svg style="position: absolute; width: 0; height: 0;">
            <defs>
                <filter id="glitch-filter">
                    <feTurbulence type="fractalNoise" baseFrequency="0.00001 0.15" numOctaves="1" result="noise" seed="0">
                        <animate attributeName="seed" values="0;100;50;200;150" dur="0.2s" repeatCount="indefinite" />
                    </feTurbulence>
                    <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" xChannelSelector="R" yChannelSelector="G" />
                </filter>
            </defs>
        </svg>
    </button>


    <h1 id="style-info">Select style</h1>

    <script src="script.js"></script>

</body>
</html>
