<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link rel="stylesheet" href="../hideScroll.css">
    <link rel="stylesheet" href="../general.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="viewport" id="viewport">
        <div class="map-wrapper" id="mapWrapper">
            <div id="map"></div>
            <div id="items"></div>
        </div>
    </div>

    <div class="zoom-controls">
        <button class="zoom-btn" data-zoom-in>+</button>
        <button class="zoom-btn" data-zoom-out>−</button>
        <button class="zoom-btn" data-zoom-reset>⤢</button>
    </div>

    <div id="top-right-data">
        <div id="top-right-data-wrapper">
            <div id="cell-info-container">
                <h1 id="cell-info-title">—</h1>
                <h3 id="cell-info-info">—</h3>
            </div>
            <div id="show-items-container">
                <input type="checkbox" name="show-items-checkbox" id="show-items-checkbox" checked>
                <label for="show-items-checkbox">Show Items</label>
            </div>
        </div>
    </div>

    <button class="image-button" type="button" id="back-button">
        <img src="../Back.png" class="default-img">
        <img src="../BackHover.png" class="hover-img">
    </button>

    <script src="Styles/baseStyle.js"></script>
    <script src="Styles/classicStyle.js"></script>
    <script src="Styles/partyStyle.js"></script>
    <script src="Styles/demoStyle.js"></script>
    <script src="Styles/nullStyle.js"></script>

    <script src="enums.js"></script>
    <script src="zoom.js"></script>
    <script src="cells.js"></script>
    <script src="items.js"></script>
    <script src="script.js"></script>
</body>
</html>
